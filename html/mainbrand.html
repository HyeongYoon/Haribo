<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main Brand</title>
  <link rel="stylesheet" href="../css/mainbrand.css">
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h2>BRAND</h2><a href="brand.html">&gt;</a>
  </div>

  <div class="container">
    <!-- 첫 번째 브랜드 카드 -->
    <div class="brand-card">
      <a href="https://www.nike.com" target="_blank">
        <img src="../img/brandnike.png" alt="Nike Logo">
      </a>
      <div class="brand-name">
        <a href="https://www.nike.com" target="_blank">NIKE</a>
      </div>
      <div class="actions">
        <button class="button" onclick="toggleInterest(this)">관심 저장</button>
      </div>
    </div>

    <!-- 두 번째 브랜드 카드 -->
    <div class="brand-card">
      <a href="https://www.adidas.com" target="_blank">

      </a>
      <div class="brand-name">
        <a href="https://www.adidas.com" target="_blank">ADIDAS</a>
      </div>
      <div class="actions">
        <button class="button" onclick="toggleInterest(this)">관심 저장</button>

      </div>

        <button class="button" onclick="toggleInterest(this)">관심 저장</button>
      </div>
    </div>

      <a href="https://www.puma.com" target="_blank">
        <img src="../img/brandpuma.png" alt="Puma Logo">
      </a>
      <div class="brand-name">

      </div>

        <button class="button" onclick="toggleInterest(this)">관심 저장</button>

    </div>

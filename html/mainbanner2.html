<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mainbanner2.html</title>
  <style>
    /* 기본 스타일 */
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    /* 배너 컨테이너 */
    .banner-container {
      width: 100%;
      height: 240px;
      overflow: hidden;
    }

    /* 배너 이미지 */
    .banner-container img {
      width: 100%; 
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <!-- 배너 2 -->
  <div class="banner-container">
    <img src="https://via.placeholder.com/1920x1080" alt="배너 이미지">
  </div>
</body>
</html>
